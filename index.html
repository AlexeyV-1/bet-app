<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <title>Document</title>
</head>

<body>
    <h2 class="title">Добро пожаловать в наше казино!</h2>
    <p class="text">Пусть удача окажется на вашей стороне!</p>
    <div class="casino">
        <div class="casino__bet">
            <button class="casino__bet-minus" type="button">-</button>
            <span class="casino__bet-value"></span>
            <button class="casino__bet-plus" type="button">+</button>
        </div>
        <span class="casino__balance"></span>
        <button class="casino__play" type="button">Играть</button>
        <p class="casino__result"></p>
    </div>
    <script src="./JS/main.js" type="module"></script>
</body>

</html>
